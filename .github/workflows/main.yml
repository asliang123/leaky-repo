name: Token Check
on: workflow_dispatch
jobs:
  print-length:
    runs-on: ubuntu-latest
    steps:
      - run: |
          # We can't print the token itself (GitHub masks it), 
          # but we can see its structure and length.
          echo "Token starts with: ${GITHUB_TOKEN:0:10}..."
          echo "Total length: ${#GITHUB_TOKEN} characters"
